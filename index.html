<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pomodoro</title>
  <link rel="stylesheet" href="index.css" />
</head>
<body>
  <div class="container">
    <h1>Pomodoro</h1>

    <div class="current-time" id="currentTime"></div>

    <div class="timer">25:00</div>

    <div class="controls">
      <button class="btn btn-start" onclick="startTimer()">시작</button>
      <button class="btn btn-stop" onclick="stopTimer()">정지</button>
      <button class="btn btn-reset" onclick="resetTimer()">초기화</button>
    </div>

    <a href="setting.html" class="btn btn-settings">설정</a>
  </div>
  <script src="index.js"></script>
  <script>
    function updateClock() {
      const now = new Date();
      const h = String(now.getHours()).padStart(2, '0');
      const m = String(now.getMinutes()).padStart(2, '0');
      const s = String(now.getSeconds()).padStart(2, '0');
      document.getElementById('currentTime').textContent = `${h}:${m}:${s}`;
    }
    updateClock();
    setInterval(updateClock, 1000);
  </script>
</body>
</html>
